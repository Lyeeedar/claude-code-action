name: Compile Agent Tasks

on:
  push:
    paths:
      - ".github/agents/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write  # for creating steering issues

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout claude-code-action (compiler)
        uses: actions/checkout@v4
        with:
          repository: Lyeeedar/claude-code-action
          ref: main
          path: .claude-action

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install compiler dependencies
        run: bun install
        working-directory: .claude-action

      - name: Compile agent tasks
        run: |
          bun run src/entrypoints/compile-agents.ts \
            "$GITHUB_WORKSPACE/.github/agents" \
            "$GITHUB_WORKSPACE/.github/workflows"
        working-directory: .claude-action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTION_REPOSITORY: Lyeeedar/claude-code-action
          GITHUB_ACTION_REF: main

      - name: Open PR with compiled outputs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage generated workflows + patched task files (steering-issue numbers)
          git add .github/workflows/agent-*.yml .github/agents/

          if git diff --staged --quiet; then
            echo "Nothing changed — no PR needed"
            exit 0
          fi

          BRANCH="compile-agents/$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: compile agent tasks [skip ci]"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: compile agent tasks" \
            --body "Auto-generated: compiled .github/agents/*.md into workflow files, balanced cron schedules, created steering issues for new tasks." \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH"
