name: Compile Agent Tasks

on:
  push:
    paths:
      - ".github/agents/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ github.action_path || '.' }}

      - name: Compile agent tasks
        run: bun run src/entrypoints/compile-agents.ts .github/agents .github/workflows
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_ACTION_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTION_REF: ${{ github.ref_name }}

      - name: Commit and PR generated workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/agent-*.yml
          if git diff --staged --quiet; then
            echo "No workflow changes — nothing to do"
            exit 0
          fi

          BRANCH="compile-agents/$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: recompile agent workflows [skip ci]"
          git push origin "$BRANCH"

          # Try direct push to default branch first (works without protection)
          if git push origin "$BRANCH:${{ github.event.repository.default_branch }}" 2>/dev/null; then
            echo "Pushed directly to ${{ github.event.repository.default_branch }}"
          else
            echo "Branch protection active — opening PR"
            gh pr create \
              --title "chore: recompile agent workflows" \
              --body "Auto-generated by compile-agents workflow after changes to \`.github/agents/\`." \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$BRANCH" \
              --label "automated" 2>/dev/null || \
            gh pr create \
              --title "chore: recompile agent workflows" \
              --body "Auto-generated by compile-agents workflow after changes to \`.github/agents/\`." \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$BRANCH"
          fi
