name: Compile Agent Tasks

on:
  push:
    paths:
      - ".github/agents/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ github.action_path || '.' }}

      - name: Compile agent tasks
        run: bun run src/entrypoints/compile-agents.ts .github/agents .github/workflows
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_ACTION_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTION_REF: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Open PR with compiled workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage both generated workflows AND task files (steering-issue patches)
          git add .github/workflows/agent-*.yml .github/agents/

          if git diff --staged --quiet; then
            echo "Nothing changed — no PR needed"
            exit 0
          fi

          BRANCH="compile-agents/$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: compile agent tasks [skip ci]"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: compile agent tasks" \
            --body "Auto-generated by compile-agents. Includes regenerated workflow files, auto-balanced cron schedules, and steering issues for any new tasks." \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH"
