name: Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  agent:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@agent')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@agent')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@agent')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned') ||
      (github.event_name == 'issues' && github.event.action == 'labeled') ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@agent') || contains(github.event.issue.title, '@agent'))) ||
      (github.event_name == 'pull_request_review' && endsWith(github.event.pull_request.user.login, '[bot]'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run Agent
        id: agent
        uses: Lyeeedar/claude-code-action@main
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@agent"
          assignee_trigger: "agent[bot]"
          label_trigger: "agent"
          auto_fix_pr_reviews: "true"
          bot_name: "agent[bot]"
          model_cheap: "xai/grok-4-1-fast-non-reasoning"
          model: "openai/gpt-5.3-codex"
          model_expensive: "openai/gpt-5.4"
          xai_api_key: ${{ secrets.XAI_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
